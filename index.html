<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niggle List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,100;1,9..144,200;1,9..144,300&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0D0D0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Niggle List">
  <style>
    :root {
      --bg:        #0D0D0B;
      --bg-1:      #141412;
      --bg-2:      #1C1C19;
      --bg-3:      #242420;
      --line:      rgba(255,255,255,0.06);
      --line-2:    rgba(255,255,255,0.11);
      --line-3:    rgba(255,255,255,0.18);
      --ink:       #EDE9E4;
      --ink-2:     rgba(237,233,228,0.52);
      --ink-3:     rgba(237,233,228,0.24);
      --ink-4:     rgba(237,233,228,0.10);
      --amber:     #C9894E;
      --amber-dim: rgba(201,137,78,0.18);
      --amber-line:rgba(201,137,78,0.35);
      --r:         14px;
      --r-sm:      8px;
      --r-xs:      5px;

      /* age — left border: presence, not alarm */
      --age-new-c: rgba(255,255,255,0.08);
      --age-mid-c: rgba(255,255,255,0.30);
      --age-old-c: rgba(237,233,228,0.65);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Grain overlay ──────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    header {
      padding: 52px 24px 0;
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 100;
      font-size: 36px;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--ink);
    }
    .wordmark em {
      font-style: italic;
      font-weight: 200;
    }

    .header-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--ink-3);
      line-height: 1.5;
    }

    .tally-line {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--bg-1);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: var(--ink-3);
      line-height: 1.4;
      transition: color 0.4s;
      display: none;
    }
    .tally-line.visible {
      display: block;
      color: var(--ink-2);
    }

    /* ── Filter bar ─────────────────────────── */
    #filter-bar {
      padding: 24px 24px 0;
      flex-shrink: 0;
    }

    .filter-label {
      font-size: 11px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 10px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      flex: 1;
      height: 36px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-xs);
      background: transparent;
      color: var(--ink-3);
      font-size: 12px;
      font-family: ui-monospace, 'SF Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.01em;
    }
    .filter-btn:hover {
      background: var(--bg-2);
      color: var(--ink-2);
      border-color: var(--line-3);
    }
    .filter-btn.active {
      background: var(--amber-dim);
      border-color: var(--amber-line);
      color: var(--amber);
    }
    .filter-btn.all-btn {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }

    /* ── Divider ────────────────────────────── */
    .list-divider {
      margin: 24px 24px 0;
      height: 1px;
      background: var(--line);
      flex-shrink: 0;
    }

    /* ── List ───────────────────────────────── */
    #list-area {
      flex: 1;
      padding: 0 24px;
    }

    .empty-state {
      padding: 56px 0 0;
    }
    .empty-state p {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-style: italic;
      font-size: 20px;
      color: var(--ink-3);
      line-height: 1.5;
    }
    .empty-state .empty-hint {
      font-family: system-ui, sans-serif;
      font-style: normal;
      font-size: 13px;
      font-weight: 400;
      margin-top: 10px;
      color: var(--ink-4);
    }

    .filter-empty {
      padding: 40px 0 0;
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-style: italic;
      font-size: 18px;
      color: var(--ink-3);
    }

    /* ── Niggle row ─────────────────────────── */
    .niggle-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 0 18px 14px;
      margin-left: -14px;
      border-bottom: 1px solid var(--line);
      border-left: 2px solid var(--age-new-c);
      overflow: hidden;
      max-height: 300px;
      transition:
        max-height 0.38s ease,
        opacity 0.38s ease,
        padding-top 0.38s ease,
        padding-bottom 0.38s ease,
        border-bottom-color 0.38s ease,
        margin-bottom 0.38s ease;
    }
    .niggle-row.age-mid {
      border-left-width: 3px;
      border-left-color: var(--age-mid-c);
    }
    .niggle-row.age-old {
      border-left-width: 4px;
      border-left-color: var(--age-old-c);
    }
    .niggle-row.collapsing {
      max-height: 0 !important;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-bottom-color: transparent;
      margin-bottom: 0;
    }

    /* Check button */
    .check-btn {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--line-3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      color: var(--ink);
    }
    .check-btn:hover { border-color: var(--ink-2); }
    .check-btn.checked {
      background: var(--bg-3);
      border-color: var(--line-3);
    }
    .check-icon { opacity: 0; transition: opacity 0.12s; }
    .check-btn.checked .check-icon { opacity: 1; }

    .niggle-body { flex: 1; min-width: 0; }

    .niggle-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.5;
      word-break: break-word;
      transition: color 0.3s;
    }
    .niggle-text.struck {
      text-decoration: line-through;
      text-decoration-color: rgba(237,233,228,0.25);
      color: var(--ink-3);
    }

    .niggle-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .meta-chip {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 11px;
      color: var(--ink-3);
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: 3px;
      padding: 1px 7px;
      letter-spacing: 0.01em;
    }

    /* ── FAB ────────────────────────────────── */
    #fab {
      position: fixed;
      bottom: 28px;
      right: max(24px, calc(50vw - 240px + 24px));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--line-3);
      background: var(--bg-2);
      color: var(--ink);
      font-size: 26px;
      font-weight: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.05) inset;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      line-height: 1;
    }
    #fab:hover { background: var(--bg-3); transform: scale(1.05); }
    #fab:active { transform: scale(0.95); }

    /* ── Sheet ──────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #overlay.open { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      max-height: 92dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-1);
      border: 1px solid var(--line-2);
      border-bottom: none;
      border-radius: 18px 18px 0 0;
      padding: 0 20px calc(24px + env(safe-area-inset-bottom, 0px));
      z-index: 30;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--line-3);
      margin: 14px auto 22px;
    }

    .sheet-title {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 200;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    #niggle-input {
      width: 100%;
      min-height: 80px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 13px 15px;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.55;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    #niggle-input:focus { border-color: var(--line-3); }
    #niggle-input::placeholder { color: var(--ink-3); }

    .sheet-label {
      font-size: 11px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 16px 0 9px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .time-btn {
      height: 38px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-xs);
      background: var(--bg-2);
      color: var(--ink-2);
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .time-btn:hover { background: var(--bg-3); color: var(--ink); border-color: var(--line-3); }
    .time-btn.sel {
      background: var(--amber-dim);
      border-color: var(--amber-line);
      color: var(--amber);
    }

    #room-input {
      width: 100%;
      height: 40px;
      background: var(--bg-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-xs);
      padding: 0 13px;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    #room-input:focus { border-color: var(--line-3); }
    #room-input::placeholder { color: var(--ink-3); }

    #add-btn {
      margin-top: 20px;
      width: 100%;
      height: 48px;
      border-radius: var(--r-sm);
      border: 1px solid var(--line-2);
      background: var(--bg-3);
      color: var(--ink-3);
      font-size: 15px;
      font-family: inherit;
      cursor: default;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.01em;
    }
    #add-btn.ready {
      background: var(--amber-dim);
      border-color: var(--amber-line);
      color: var(--amber);
      cursor: pointer;
    }
    #add-btn.ready:hover {
      background: rgba(201,137,78,0.25);
    }
    #add-btn.ready:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="wordmark">The <em>Niggle</em> List</div>
    <div class="header-sub">Small annoyances. Cleared when the time is right.</div>
    <div class="tally-line" id="tally"></div>
  </header>

  <div id="filter-bar">
    <div class="filter-label">I've got</div>
    <div class="filter-row">
      <button class="filter-btn all-btn active" data-f="all">All</button>
      <button class="filter-btn" data-f="5">5 min</button>
      <button class="filter-btn" data-f="15">15 min</button>
      <button class="filter-btn" data-f="30">30 min</button>
      <button class="filter-btn" data-f="60">60+</button>
    </div>
  </div>

  <div class="list-divider"></div>
  <div id="list-area"></div>
</div>

<button id="fab" aria-label="Add a niggle">+</button>

<div id="overlay"></div>

<div id="sheet" role="dialog" aria-modal="true" aria-label="Capture a niggle">
  <div class="sheet-handle"></div>
  <div class="sheet-title">What's the niggle?</div>

  <textarea id="niggle-input" placeholder="Squeaky hinge, loose tile, flickering bulb…" maxlength="300"></textarea>

  <div class="sheet-label">Time needed</div>
  <div class="time-grid">
    <button class="time-btn" data-t="5">5 min</button>
    <button class="time-btn" data-t="15">15 min</button>
    <button class="time-btn" data-t="30">30 min</button>
    <button class="time-btn" data-t="60">60+</button>
  </div>

  <div class="sheet-label">Room / area <span style="font-size:10px;text-transform:none;letter-spacing:0;color:var(--ink-3)">(optional)</span></div>
  <input type="text" id="room-input" placeholder="Kitchen, garage, hallway…" maxlength="60">

  <button id="add-btn">Add niggle</button>
</div>

<script>
const STORE = 'niggle_v1';
let niggles = (() => { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } })();
let filter = 'all';
let selTime = null;

const $ = id => document.getElementById(id);
const listEl  = $('list-area');
const tallyEl = $('tally');
const overlay = $('overlay');
const sheet   = $('sheet');
const inp     = $('niggle-input');
const roomInp = $('room-input');
const addBtn  = $('add-btn');
const timeBtns  = document.querySelectorAll('.time-btn');
const filterBtns = document.querySelectorAll('.filter-btn');

function save() { localStorage.setItem(STORE, JSON.stringify(niggles)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function monthKey(ts) {
  const d = new Date(ts || Date.now());
  return `${d.getFullYear()}-${d.getMonth()}`;
}

function ageClass(ts) {
  const days = (Date.now() - ts) / 86400000;
  if (days >= 28) return 'age-old';
  if (days >= 7)  return 'age-mid';
  return '';
}

function timeLabel(m) {
  if (!m) return null;
  return m >= 60 ? '60+ min' : `${m} min`;
}

// ── Tally ──────────────────────────────────────
function updateTally() {
  const mk = monthKey();
  const done = niggles.filter(n => n.completedAt && monthKey(n.completedAt) === mk);
  if (!done.length) { tallyEl.classList.remove('visible'); return; }
  const mins = done.reduce((s, n) => s + (n.estimateMinutes || 0), 0);
  tallyEl.textContent = `${done.length} cleared this month — about ${mins} minutes reclaimed.`;
  tallyEl.classList.add('visible');
}

// ── Render ─────────────────────────────────────
function render() {
  updateTally();
  const pending = niggles.filter(n => !n.completedAt);
  let shown = filter === 'all'
    ? pending
    : pending.filter(n => n.estimateMinutes === parseInt(filter));

  shown = shown.slice().sort((a, b) => a.createdAt - b.createdAt);
  listEl.innerHTML = '';

  if (pending.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <p>Nothing on the list.</p>
      <p class="empty-hint">Tap + to capture your first niggle.</p>
    </div><div style="height:100px"></div>`;
    return;
  }

  if (shown.length === 0) {
    listEl.innerHTML = `<div class="filter-empty">Nothing fits that window right now.</div>
    <div style="height:100px"></div>`;
    return;
  }

  shown.forEach(n => {
    const row = document.createElement('div');
    row.className = 'niggle-row ' + ageClass(n.createdAt);
    row.dataset.id = n.id;

    const checkBtn = document.createElement('button');
    checkBtn.className = 'check-btn';
    checkBtn.setAttribute('aria-label', 'Mark complete');
    checkBtn.innerHTML = `<svg class="check-icon" width="11" height="8" viewBox="0 0 11 8" fill="none">
      <path d="M1 3.8L4 7L10 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const body = document.createElement('div');
    body.className = 'niggle-body';

    const textEl = document.createElement('div');
    textEl.className = 'niggle-text';
    textEl.textContent = n.text;

    const meta = document.createElement('div');
    meta.className = 'niggle-meta';
    if (n.estimateMinutes) {
      const c = document.createElement('span');
      c.className = 'meta-chip';
      c.textContent = timeLabel(n.estimateMinutes);
      meta.appendChild(c);
    }
    if (n.room) {
      const c = document.createElement('span');
      c.className = 'meta-chip';
      c.textContent = n.room;
      meta.appendChild(c);
    }

    body.appendChild(textEl);
    if (meta.children.length) body.appendChild(meta);
    row.appendChild(checkBtn);
    row.appendChild(body);
    listEl.appendChild(row);

    checkBtn.addEventListener('click', () => completeNiggle(n.id, row, textEl));
  });

  const pad = document.createElement('div');
  pad.style.height = '100px';
  listEl.appendChild(pad);
}

// ── Complete ───────────────────────────────────
function completeNiggle(id, row, textEl) {
  const btn = row.querySelector('.check-btn');
  if (btn.classList.contains('checked')) return;

  btn.classList.add('checked');
  textEl.classList.add('struck');

  setTimeout(() => {
    row.classList.add('collapsing');
    setTimeout(() => {
      const idx = niggles.findIndex(n => n.id === id);
      if (idx !== -1) { niggles[idx].completedAt = Date.now(); save(); }
      row.remove();
      updateTally();
    }, 400);
  }, 520);
}

// ── Filter ─────────────────────────────────────
filterBtns.forEach(b => {
  b.addEventListener('click', () => {
    filterBtns.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.f;
    render();
  });
});

// ── Sheet ──────────────────────────────────────
function openSheet() {
  overlay.classList.add('open');
  sheet.classList.add('open');
  setTimeout(() => inp.focus(), 340);
}

function closeSheet() {
  sheet.classList.remove('open');
  overlay.classList.remove('open');
  inp.value = '';
  roomInp.value = '';
  selTime = null;
  timeBtns.forEach(b => b.classList.remove('sel'));
  setReady();
}

function setReady() {
  const ok = inp.value.trim().length > 0;
  addBtn.classList.toggle('ready', ok);
}

$('fab').addEventListener('click', openSheet);
overlay.addEventListener('click', closeSheet);

inp.addEventListener('input', setReady);

timeBtns.forEach(b => {
  b.addEventListener('click', () => {
    timeBtns.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    selTime = parseInt(b.dataset.t);
  });
});

addBtn.addEventListener('click', () => {
  const text = inp.value.trim();
  if (!text) return;

  niggles.push({
    id: uid(),
    text,
    estimateMinutes: selTime,
    room: roomInp.value.trim() || null,
    createdAt: Date.now(),
    completedAt: null,
  });
  save();
  closeSheet();
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && sheet.classList.contains('open')) {
    if (inp.value.trim()) addBtn.click();
  }
});

// Lift sheet above keyboard on mobile
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (!sheet.classList.contains('open')) return;
    const gap = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    sheet.style.bottom = gap > 0 ? gap + 'px' : '';
  });
}

render();
</script>
</body>
</html>
