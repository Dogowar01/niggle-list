<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Niggle List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,200;0,9..144,300;1,9..144,100;1,9..144,200;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0C0B0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Niggle List">
  <style>
    :root {
      --bg:         #0C0B0A;
      --surface:    #161412;
      --surface-2:  #1D1B18;
      --surface-3:  #242220;
      --line:       rgba(255,248,235,0.06);
      --line-2:     rgba(255,248,235,0.11);
      --line-3:     rgba(255,248,235,0.20);
      --ink:        #EDE8DF;
      --ink-2:      rgba(237,232,223,0.56);
      --ink-3:      rgba(237,232,223,0.28);
      --ink-4:      rgba(237,232,223,0.12);
      --amber:      #C8894A;
      --amber-rich: #D4975C;
      --amber-glow: rgba(200,137,74,0.18);
      --amber-border:rgba(200,137,74,0.38);
      --amber-text: #E8A96A;

      /* age — warm wood tones, not alarm colours */
      --age-new:    rgba(255,248,235,0.08);
      --age-mid:    rgba(180,140,90,0.50);
      --age-old:    rgba(200,137,74,0.85);

      --r:   14px;
      --r-sm: 9px;
      --r-xs: 6px;
      --card-shadow: 0 1px 0 rgba(255,248,235,0.04) inset, 0 2px 8px rgba(0,0,0,0.45), 0 12px 28px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ══════════════════════════════════════════
       HERO
    ══════════════════════════════════════════ */
    #hero {
      position: relative;
      width: 100%;
      height: 46vh;
      min-height: 260px;
      max-height: 400px;
      overflow: hidden;
    }

    #hero-bg {
      position: absolute;
      inset: -4px;
      background: url('bg.png') center 18% / cover no-repeat;
      transform-origin: center;
      will-change: transform;
    }

    #hero-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(12,11,10,0.22)  0%,
          rgba(12,11,10,0.0)   22%,
          rgba(12,11,10,0.0)   45%,
          rgba(12,11,10,0.65)  72%,
          rgba(12,11,10,1.0)  100%
        ),
        linear-gradient(to right,
          rgba(12,11,10,0.35) 0%,
          transparent 40%,
          transparent 60%,
          rgba(12,11,10,0.35) 100%
        );
    }

    #hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 24px 20px;
    }

    .wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 100;
      font-size: clamp(38px, 10vw, 52px);
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: var(--ink);
      text-shadow: 0 2px 24px rgba(0,0,0,0.6), 0 1px 4px rgba(0,0,0,0.4);
    }
    .wordmark span {
      font-style: normal;
      font-weight: 200;
      color: var(--ink-2);
      font-size: 0.55em;
      letter-spacing: 0.02em;
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      text-shadow: none;
    }

    /* ══════════════════════════════════════════
       MAIN BODY
    ══════════════════════════════════════════ */
    #main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 18px;
    }

    /* ── Tally ─── */
    #tally {
      margin: 0 0 20px;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 12px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
      min-height: 18px;
      transition: color 0.5s;
      padding: 0 2px;
    }
    #tally.lit {
      color: var(--amber-text);
    }

    /* ── Filter ─── */
    #filter-wrap {
      margin-bottom: 24px;
    }

    .filter-eyebrow {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-4);
      margin-bottom: 10px;
      padding: 0 2px;
    }

    #filter-row {
      display: flex;
      gap: 7px;
    }

    .f-btn {
      flex: 1;
      height: 42px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      background: var(--surface);
      color: var(--ink-3);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.16s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .f-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--amber-glow);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .f-btn:hover { color: var(--ink-2); border-color: var(--line-3); }
    .f-btn:hover::before { opacity: 0.6; }
    .f-btn.on {
      border-color: var(--amber-border);
      color: var(--amber-text);
      box-shadow: 0 0 0 1px var(--amber-border) inset, 0 4px 16px rgba(200,137,74,0.12);
    }
    .f-btn.on::before { opacity: 1; }

    .f-btn .f-min {
      display: block;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 12px;
      line-height: 1;
    }
    .f-btn .f-label {
      display: block;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-4);
      margin-top: 2px;
      transition: color 0.16s;
    }
    .f-btn.on .f-label { color: var(--amber); }
    .f-btn.all-btn { font-size: 13px; }

    /* ── Divider ─── */
    .divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 16px;
    }

    /* ══════════════════════════════════════════
       NIGGLE LIST
    ══════════════════════════════════════════ */
    #list { padding-bottom: 120px; }

    .empty {
      padding: 48px 4px 0;
    }
    .empty-head {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 24px;
      color: var(--ink-3);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .empty-sub {
      font-size: 13px;
      color: var(--ink-4);
      line-height: 1.65;
    }

    .no-match {
      padding: 36px 4px 0;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 20px;
      color: var(--ink-3);
    }

    /* ── Card ─── */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 16px 18px;
      margin-bottom: 8px;
      border-left: 3px solid var(--age-new);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      max-height: 300px;
      transition:
        max-height 0.38s ease,
        opacity    0.38s ease,
        padding    0.38s ease,
        margin     0.38s ease,
        border-bottom-color 0.38s ease;
    }
    .card.age-mid { border-left-color: var(--age-mid); }
    .card.age-old { border-left-color: var(--age-old); }
    .card.collapsing {
      max-height: 0 !important;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      border-bottom-color: transparent;
    }

    /* check circle */
    .chk {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--line-3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0px;
      transition: border-color 0.15s, background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      color: var(--bg);
      flex-shrink: 0;
    }
    .chk:hover {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }
    .chk.done {
      background: var(--amber);
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-glow), 0 2px 8px rgba(200,137,74,0.3);
    }
    .chk svg { opacity: 0; transition: opacity 0.12s; }
    .chk.done svg { opacity: 1; }

    .card-body { flex: 1; min-width: 0; }

    .card-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.5;
      word-break: break-word;
      transition: color 0.3s;
    }
    .card-text.struck {
      text-decoration: line-through;
      text-decoration-color: rgba(237,232,223,0.22);
      color: var(--ink-4);
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
      background: var(--surface-2);
      border: 1px solid var(--line-2);
      border-radius: 4px;
      padding: 2px 8px;
      letter-spacing: 0.02em;
    }
    .chip.time-chip {
      color: var(--amber);
      background: var(--amber-glow);
      border-color: rgba(200,137,74,0.2);
    }

    /* ══════════════════════════════════════════
       FAB
    ══════════════════════════════════════════ */
    #fab {
      position: fixed;
      bottom: 28px;
      right: max(20px, calc(50vw - 220px));
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--amber);
      border: none;
      color: #1A0E00;
      font-size: 28px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow:
        0 0 0 1px rgba(255,200,120,0.25) inset,
        0 4px 16px rgba(200,137,74,0.45),
        0 12px 40px rgba(200,137,74,0.25),
        0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      line-height: 1;
    }
    #fab:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 0 1px rgba(255,200,120,0.3) inset,
        0 6px 20px rgba(200,137,74,0.55),
        0 16px 48px rgba(200,137,74,0.3),
        0 2px 8px rgba(0,0,0,0.4);
    }
    #fab:active { transform: scale(0.94); }

    /* ══════════════════════════════════════════
       SHEET
    ══════════════════════════════════════════ */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
    }
    #overlay.open { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(102%);
      width: 100%;
      max-width: 480px;
      max-height: 93dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      border: 1px solid var(--line-2);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      z-index: 30;
      transition: transform 0.34s cubic-bezier(0.32,0.72,0,1);
    }
    #sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-inner {
      padding: 0 22px calc(28px + env(safe-area-inset-bottom, 0px));
    }

    .handle-wrap {
      display: flex;
      justify-content: center;
      padding: 14px 0 20px;
    }
    .handle {
      width: 44px;
      height: 4px;
      border-radius: 2px;
      background: var(--line-3);
    }

    .sheet-title {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 26px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 18px;
      line-height: 1.15;
    }

    #niggle-input {
      width: 100%;
      min-height: 90px;
      background: var(--surface-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.55;
      resize: none;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    #niggle-input:focus {
      border-color: var(--line-3);
      box-shadow: 0 0 0 3px rgba(255,248,235,0.04);
    }
    #niggle-input::placeholder { color: var(--ink-4); }

    .s-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--ink-4);
      margin: 20px 0 10px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .t-btn {
      height: 48px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      background: var(--surface-2);
      color: var(--ink-3);
      cursor: pointer;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
      overflow: hidden;
    }
    .t-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--amber-glow);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .t-btn:hover { border-color: var(--line-3); color: var(--ink-2); }
    .t-btn.sel {
      border-color: var(--amber-border);
      color: var(--amber-text);
      box-shadow: 0 0 0 1px var(--amber-border) inset;
    }
    .t-btn.sel::before { opacity: 1; }
    .t-num {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      position: relative;
    }
    .t-unit {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-4);
      line-height: 1;
      position: relative;
      transition: color 0.14s;
    }
    .t-btn.sel .t-unit { color: var(--amber); }

    #room-input {
      width: 100%;
      height: 44px;
      background: var(--surface-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 0 14px;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
    }
    #room-input:focus { border-color: var(--line-3); }
    #room-input::placeholder { color: var(--ink-4); }

    #add-btn {
      margin-top: 22px;
      width: 100%;
      height: 52px;
      border-radius: var(--r-sm);
      border: 1px solid var(--line-2);
      background: var(--surface-3);
      color: var(--ink-4);
      font-size: 16px;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      letter-spacing: 0.01em;
      cursor: default;
      transition: all 0.22s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    #add-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,151,92,0.0), rgba(200,137,74,0.0));
      transition: background 0.22s;
    }
    #add-btn.ready {
      background: var(--amber);
      border-color: var(--amber-rich);
      color: #1A0E00;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,137,74,0.35), 0 1px 0 rgba(255,200,120,0.3) inset;
      font-style: italic;
    }
    #add-btn.ready:hover {
      background: var(--amber-rich);
      box-shadow: 0 6px 28px rgba(200,137,74,0.45), 0 1px 0 rgba(255,200,120,0.35) inset;
    }
    #add-btn.ready:active { transform: scale(0.98); }
  </style>
</head>
<body>

<!-- ── HERO ───────────────────────── -->
<div id="hero">
  <div id="hero-bg"></div>
  <div id="hero-gradient"></div>
  <div id="hero-content">
    <div class="wordmark">
      <span>The</span>
      <em>Niggle</em> List
    </div>
  </div>
</div>

<!-- ── MAIN ───────────────────────── -->
<div id="main">

  <div id="tally"></div>

  <div id="filter-wrap">
    <div class="filter-eyebrow">I've got</div>
    <div id="filter-row">
      <button class="f-btn all-btn on" data-f="all">All</button>
      <button class="f-btn" data-f="5">
        <span class="f-min">5</span>
        <span class="f-label">min</span>
      </button>
      <button class="f-btn" data-f="15">
        <span class="f-min">15</span>
        <span class="f-label">min</span>
      </button>
      <button class="f-btn" data-f="30">
        <span class="f-min">30</span>
        <span class="f-label">min</span>
      </button>
      <button class="f-btn" data-f="60">
        <span class="f-min">60+</span>
        <span class="f-label">min</span>
      </button>
    </div>
  </div>

  <div class="divider"></div>
  <div id="list"></div>
</div>

<!-- ── FAB ────────────────────────── -->
<button id="fab" aria-label="Add a niggle">+</button>

<!-- ── OVERLAY ────────────────────── -->
<div id="overlay"></div>

<!-- ── SHEET ──────────────────────── -->
<div id="sheet" role="dialog" aria-modal="true" aria-label="Capture a niggle">
  <div class="sheet-inner">
    <div class="handle-wrap"><div class="handle"></div></div>

    <div class="sheet-title">What's the niggle?</div>

    <textarea id="niggle-input" placeholder="Squeaky hinge, loose tile, flickering bulb…" maxlength="300"></textarea>

    <div class="s-label">Time needed</div>
    <div class="time-grid">
      <button class="t-btn" data-t="5">
        <span class="t-num">5</span>
        <span class="t-unit">min</span>
      </button>
      <button class="t-btn" data-t="15">
        <span class="t-num">15</span>
        <span class="t-unit">min</span>
      </button>
      <button class="t-btn" data-t="30">
        <span class="t-num">30</span>
        <span class="t-unit">min</span>
      </button>
      <button class="t-btn" data-t="60">
        <span class="t-num">60+</span>
        <span class="t-unit">min</span>
      </button>
    </div>

    <div class="s-label">Room / area <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ink-4);font-size:10px">(optional)</span></div>
    <input type="text" id="room-input" placeholder="Kitchen, garage, hallway…" maxlength="60">

    <button id="add-btn">Add to list</button>
  </div>
</div>

<script>
const STORE = 'niggle_v1';
let niggles = (() => { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } })();
let filter = 'all';
let selTime = null;

const $ = id => document.getElementById(id);
const listEl    = $('list');
const tallyEl   = $('tally');
const overlay   = $('overlay');
const sheet     = $('sheet');
const inp       = $('niggle-input');
const roomInp   = $('room-input');
const addBtn    = $('add-btn');
const tBtns     = document.querySelectorAll('.t-btn');
const fBtns     = document.querySelectorAll('.f-btn');

function save() { localStorage.setItem(STORE, JSON.stringify(niggles)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function monthKey(ts) {
  const d = new Date(ts || Date.now());
  return `${d.getFullYear()}-${d.getMonth()}`;
}

function ageClass(ts) {
  const d = (Date.now() - ts) / 86400000;
  return d >= 28 ? 'age-old' : d >= 7 ? 'age-mid' : '';
}

function timeFmt(m) {
  if (!m) return null;
  return m >= 60 ? '60+ min' : `${m} min`;
}

// ── Tally ───────────────────────────────
function updateTally() {
  const mk   = monthKey();
  const done = niggles.filter(n => n.completedAt && monthKey(n.completedAt) === mk);
  if (!done.length) { tallyEl.textContent = ''; tallyEl.classList.remove('lit'); return; }
  const mins = done.reduce((s, n) => s + (n.estimateMinutes || 0), 0);
  tallyEl.textContent = `${done.length} cleared this month — about ${mins} minutes reclaimed.`;
  tallyEl.classList.add('lit');
}

// ── Render ──────────────────────────────
function render() {
  updateTally();
  const pending = niggles.filter(n => !n.completedAt);
  let shown = filter === 'all'
    ? pending
    : pending.filter(n => n.estimateMinutes === parseInt(filter));
  shown = shown.slice().sort((a, b) => a.createdAt - b.createdAt);

  listEl.innerHTML = '';

  if (pending.length === 0) {
    listEl.innerHTML = `
      <div class="empty">
        <div class="empty-head">Nothing on the list.</div>
        <div class="empty-sub">Every niggle you add is one less thing<br>living rent-free in your head.</div>
      </div>`;
    return;
  }

  if (shown.length === 0) {
    listEl.innerHTML = `<div class="no-match">Nothing fits that window right now.</div>`;
    return;
  }

  shown.forEach(n => {
    const card = document.createElement('div');
    card.className = 'card ' + ageClass(n.createdAt);
    card.dataset.id = n.id;

    const chk = document.createElement('button');
    chk.className = 'chk';
    chk.setAttribute('aria-label', 'Mark complete');
    chk.innerHTML = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none">
      <path d="M1.5 4.5L4.5 7.5L10.5 1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const body = document.createElement('div');
    body.className = 'card-body';

    const txt = document.createElement('div');
    txt.className = 'card-text';
    txt.textContent = n.text;

    const meta = document.createElement('div');
    meta.className = 'card-meta';

    if (n.estimateMinutes) {
      const c = document.createElement('span');
      c.className = 'chip time-chip';
      c.textContent = timeFmt(n.estimateMinutes);
      meta.appendChild(c);
    }
    if (n.room) {
      const c = document.createElement('span');
      c.className = 'chip';
      c.textContent = n.room;
      meta.appendChild(c);
    }

    body.appendChild(txt);
    if (meta.children.length) body.appendChild(meta);
    card.appendChild(chk);
    card.appendChild(body);
    listEl.appendChild(card);

    chk.addEventListener('click', () => complete(n.id, card, txt));
  });
}

// ── Complete ────────────────────────────
function complete(id, card, txtEl) {
  const chk = card.querySelector('.chk');
  if (chk.classList.contains('done')) return;
  chk.classList.add('done');
  txtEl.classList.add('struck');

  setTimeout(() => {
    card.classList.add('collapsing');
    setTimeout(() => {
      const i = niggles.findIndex(n => n.id === id);
      if (i !== -1) { niggles[i].completedAt = Date.now(); save(); }
      card.remove();
      updateTally();
    }, 400);
  }, 520);
}

// ── Filter ──────────────────────────────
fBtns.forEach(b => {
  b.addEventListener('click', () => {
    fBtns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    filter = b.dataset.f;
    render();
  });
});

// ── Sheet ───────────────────────────────
function openSheet() {
  overlay.classList.add('open');
  sheet.classList.add('open');
  setTimeout(() => inp.focus(), 340);
}

function closeSheet() {
  sheet.classList.remove('open');
  overlay.classList.remove('open');
  setTimeout(() => {
    inp.value = '';
    roomInp.value = '';
    selTime = null;
    tBtns.forEach(b => b.classList.remove('sel'));
    setReady();
  }, 340);
}

function setReady() {
  addBtn.classList.toggle('ready', inp.value.trim().length > 0);
}

$('fab').addEventListener('click', openSheet);
overlay.addEventListener('click', closeSheet);
inp.addEventListener('input', setReady);

tBtns.forEach(b => {
  b.addEventListener('click', () => {
    tBtns.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    selTime = parseInt(b.dataset.t);
  });
});

addBtn.addEventListener('click', () => {
  const text = inp.value.trim();
  if (!text) return;
  niggles.push({
    id: uid(),
    text,
    estimateMinutes: selTime,
    room: roomInp.value.trim() || null,
    createdAt: Date.now(),
    completedAt: null,
  });
  save();
  closeSheet();
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && sheet.classList.contains('open')) {
    if (inp.value.trim()) addBtn.click();
  }
});

// Lift sheet above keyboard on mobile
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (!sheet.classList.contains('open')) return;
    const gap = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    sheet.style.bottom = gap > 0 ? gap + 'px' : '';
  });
}

render();
</script>
</body>
</html>
