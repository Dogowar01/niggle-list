<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Niggle List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,200;0,9..144,300;1,9..144,100;1,9..144,200;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0A0810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Niggle List">
  <style>
    :root {
      --bg:          #0A0810;
      --glass:       rgba(10,7,18,0.65);
      --glass-2:     rgba(14,10,24,0.75);
      --glass-sheet: rgba(10,7,20,0.88);
      --line:        rgba(255,245,255,0.06);
      --line-2:      rgba(255,245,255,0.11);
      --line-3:      rgba(255,245,255,0.19);
      --ink:         #EDE8F2;
      --ink-2:       rgba(237,232,242,0.56);
      --ink-3:       rgba(237,232,242,0.28);
      --ink-4:       rgba(237,232,242,0.12);

      /* ── Plum palette ── */
      --plum:        #9552C8;
      --plum-rich:   #A968DC;
      --plum-glow:   rgba(149,82,200,0.24);
      --plum-border: rgba(149,82,200,0.42);
      --plum-text:   #C8A0EE;
      --plum-deep:   rgba(149,82,200,0.10);
      --plum-shadow: rgba(149,82,200,0.35);

      /* age — presence, not alarm */
      --age-new:    rgba(255,245,255,0.07);
      --age-mid:    rgba(149,82,200,0.38);
      --age-old:    rgba(149,82,200,0.85);

      --r:    14px;
      --r-sm: 10px;
      --r-xs: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      color: var(--ink);
      font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ══ FULL-SCREEN BACKGROUND ══════════════ */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('bg.png') center center / cover no-repeat;
    }
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(160deg, rgba(20,8,36,0.82) 0%, rgba(8,5,16,0.72) 100%);
    }

    /* ══ APP SHELL ═══════════════════════════ */
    #app {
      position: relative;
      z-index: 2;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 18px;
    }

    /* ══ HEADER ══════════════════════════════ */
    header {
      padding: 52px 4px 20px;
      flex-shrink: 0;
    }

    .wordmark {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 100;
      font-size: clamp(40px, 11vw, 56px);
      letter-spacing: -0.035em;
      line-height: 0.92;
      color: var(--ink);
    }
    .wordmark-sup {
      font-family: 'Fraunces', Georgia, serif;
      font-style: normal;
      font-weight: 200;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-3);
      display: block;
      margin-bottom: 6px;
    }

    #tally {
      margin-top: 12px;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 12px;
      color: var(--ink-4);
      letter-spacing: 0.01em;
      min-height: 16px;
      transition: color 0.5s;
      padding: 0 1px;
    }
    #tally.lit { color: var(--plum-text); }

    /* ══ TABS ════════════════════════════════ */
    #tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: rgba(255,245,255,0.04);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 4px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      height: 36px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--ink-3);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .tab.on {
      background: var(--glass-2);
      color: var(--ink);
      box-shadow:
        0 1px 0 rgba(255,245,255,0.06) inset,
        0 2px 8px rgba(0,0,0,0.4);
    }
    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: var(--plum-glow);
      border: 1px solid var(--plum-border);
      border-radius: 50%;
      font-size: 10px;
      color: var(--plum-text);
      margin-left: 6px;
      font-family: ui-monospace, monospace;
      vertical-align: middle;
    }

    /* ══ FILTER BAR ══════════════════════════ */
    #filter-wrap {
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .filter-eyebrow {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-4);
      margin-bottom: 9px;
    }
    #filter-row {
      display: flex;
      gap: 6px;
    }
    .f-btn {
      flex: 1;
      height: 44px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--ink-3);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.16s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .f-btn:hover { color: var(--ink-2); border-color: var(--line-3); }
    .f-btn.on {
      background: var(--plum-deep);
      border-color: var(--plum-border);
      color: var(--plum-text);
      box-shadow: 0 0 0 1px var(--plum-border) inset, 0 4px 20px var(--plum-glow);
    }
    .f-num {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
    }
    .f-unit {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-4);
      line-height: 1;
      transition: color 0.16s;
    }
    .f-btn.on .f-unit { color: var(--plum-text); opacity: 0.7; }
    .f-btn.all-btn { font-size: 13px; flex-direction: row; gap: 0; }

    /* room filter */
    #room-filter-wrap {
      margin-top: 8px;
      display: none;
    }
    #room-filter-wrap.visible { display: flex; gap: 6px; flex-wrap: wrap; }
    .rf-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--line-2);
      border-radius: 20px;
      background: var(--glass);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--ink-3);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .rf-btn:hover { color: var(--ink-2); border-color: var(--line-3); }
    .rf-btn.on {
      background: var(--plum-deep);
      border-color: var(--plum-border);
      color: var(--plum-text);
    }

    /* ══ LIST ════════════════════════════════ */
    #list-area {
      flex: 1;
      padding-bottom: 120px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 16px;
    }

    .empty {
      padding: 52px 4px 0;
    }
    .empty-head {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 24px;
      color: var(--ink-3);
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .empty-sub {
      font-size: 13px;
      color: var(--ink-4);
      line-height: 1.7;
    }
    .no-match {
      padding: 36px 4px 0;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 20px;
      color: var(--ink-3);
    }

    /* ── Card ── */
    .card {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--line-2);
      border-left: 3px solid var(--age-new);
      border-radius: var(--r-sm);
      padding: 16px 18px;
      margin-bottom: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35), 0 8px 28px rgba(0,0,0,0.2), 0 1px 0 rgba(255,245,255,0.04) inset;
      overflow: hidden;
      max-height: 300px;
      transition:
        max-height 0.38s ease,
        opacity    0.38s ease,
        padding    0.38s ease,
        margin     0.38s ease;
      user-select: none;
      touch-action: pan-y;
    }
    .card.age-mid { border-left-color: var(--age-mid); }
    .card.age-old { border-left-color: var(--age-old); }
    .card.collapsing {
      max-height: 0 !important;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    /* swipe-to-delete */
    .card-inner {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      flex: 1;
      width: 100%;
      transition: transform 0.22s ease;
    }
    .card.swiping .card-inner { transition: none; }
    .delete-reveal {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: rgba(160,50,80,0.85);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      color: rgba(255,220,220,0.9);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.18s;
      gap: 6px;
      pointer-events: none;
    }
    .card.swipe-open .delete-reveal {
      opacity: 1;
      pointer-events: all;
    }
    .delete-reveal svg { flex-shrink: 0; }

    /* check button */
    .chk {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--line-3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      color: var(--ink);
    }
    .chk:hover {
      border-color: var(--plum);
      box-shadow: 0 0 0 4px var(--plum-glow);
    }
    .chk.done {
      background: var(--plum);
      border-color: var(--plum);
      box-shadow: 0 0 0 4px var(--plum-glow), 0 2px 10px var(--plum-shadow);
    }
    .chk svg { opacity: 0; transition: opacity 0.12s; }
    .chk.done svg { opacity: 1; }

    .card-body { flex: 1; min-width: 0; }
    .card-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.5;
      word-break: break-word;
      transition: color 0.3s;
    }
    .card-text.struck {
      text-decoration: line-through;
      text-decoration-color: rgba(237,232,242,0.2);
      color: var(--ink-4);
    }
    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      align-items: center;
    }
    .chip {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
      background: rgba(255,245,255,0.05);
      border: 1px solid var(--line-2);
      border-radius: 4px;
      padding: 2px 8px;
      letter-spacing: 0.02em;
    }
    .chip.time { color: var(--plum-text); background: var(--plum-deep); border-color: rgba(149,82,200,0.2); }
    .chip.cleared { color: var(--ink-4); font-style: italic; font-family: inherit; font-size: 11px; }

    /* done-tab restore button */
    .restore-btn {
      flex-shrink: 0;
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--line-2);
      border-radius: 20px;
      background: rgba(255,245,255,0.05);
      color: var(--ink-3);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      margin-top: 1px;
    }
    .restore-btn:hover {
      border-color: var(--plum-border);
      color: var(--plum-text);
      background: var(--plum-deep);
    }

    /* clear-done button */
    #clear-done-btn {
      display: block;
      width: 100%;
      margin-bottom: 16px;
      height: 38px;
      border: 1px solid rgba(160,50,80,0.3);
      border-radius: var(--r-sm);
      background: rgba(160,50,80,0.08);
      color: rgba(220,140,150,0.6);
      font-size: 12px;
      font-family: inherit;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.16s;
      -webkit-tap-highlight-color: transparent;
    }
    #clear-done-btn:hover {
      background: rgba(160,50,80,0.14);
      color: rgba(220,140,150,0.85);
      border-color: rgba(160,50,80,0.45);
    }

    /* ══ FAB ═════════════════════════════════ */
    #fab {
      position: fixed;
      bottom: 28px;
      right: max(20px, calc(50vw - 220px));
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--plum);
      border: none;
      color: rgba(255,245,255,0.95);
      font-size: 28px;
      font-weight: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow:
        0 0 0 1px rgba(200,160,255,0.2) inset,
        0 4px 20px var(--plum-shadow),
        0 12px 48px rgba(149,82,200,0.22),
        0 2px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      line-height: 1;
    }
    #fab:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 0 1px rgba(200,160,255,0.28) inset,
        0 6px 28px rgba(149,82,200,0.55),
        0 16px 56px rgba(149,82,200,0.28),
        0 2px 8px rgba(0,0,0,0.5);
    }
    #fab:active { transform: scale(0.93); }

    /* ══ SHEET ═══════════════════════════════ */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,2,10,0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
    }
    #overlay.open { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(102%);
      width: 100%;
      max-width: 480px;
      max-height: 93dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--glass-sheet);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(149,82,200,0.18);
      border-bottom: none;
      border-radius: 22px 22px 0 0;
      z-index: 30;
      transition: transform 0.34s cubic-bezier(0.32,0.72,0,1);
    }
    #sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-inner {
      padding: 0 22px calc(28px + env(safe-area-inset-bottom, 0px));
    }
    .handle-wrap {
      display: flex;
      justify-content: center;
      padding: 14px 0 20px;
    }
    .handle {
      width: 44px;
      height: 4px;
      border-radius: 2px;
      background: rgba(149,82,200,0.35);
    }
    .sheet-title {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      font-size: 26px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 18px;
      line-height: 1.15;
    }

    #niggle-input {
      width: 100%;
      min-height: 92px;
      background: rgba(255,245,255,0.05);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 14px 16px;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.55;
      resize: none;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    #niggle-input:focus {
      border-color: var(--plum-border);
      box-shadow: 0 0 0 3px var(--plum-glow);
    }
    #niggle-input::placeholder { color: var(--ink-4); }

    .s-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--ink-4);
      margin: 20px 0 10px;
    }

    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .t-btn {
      height: 50px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      background: rgba(255,245,255,0.04);
      color: var(--ink-3);
      cursor: pointer;
      transition: all 0.14s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .t-btn:hover { border-color: var(--line-3); color: var(--ink-2); }
    .t-btn.sel {
      background: var(--plum-deep);
      border-color: var(--plum-border);
      color: var(--plum-text);
      box-shadow: 0 0 0 1px var(--plum-border) inset, 0 4px 16px var(--plum-glow);
    }
    .t-num { font-family: ui-monospace, 'SF Mono', monospace; font-size: 15px; font-weight: 600; line-height: 1; }
    .t-unit { font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-4); line-height: 1; transition: color 0.14s; }
    .t-btn.sel .t-unit { color: var(--plum-text); opacity: 0.65; }

    #room-cap-input {
      width: 100%;
      height: 44px;
      background: rgba(255,245,255,0.04);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 0 14px;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s;
    }
    #room-cap-input:focus { border-color: var(--plum-border); }
    #room-cap-input::placeholder { color: var(--ink-4); }

    #add-btn {
      margin-top: 22px;
      width: 100%;
      height: 52px;
      border-radius: var(--r-sm);
      border: 1px solid var(--line-2);
      background: rgba(255,245,255,0.04);
      color: var(--ink-4);
      font-size: 16px;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 200;
      cursor: default;
      transition: all 0.24s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #add-btn.ready {
      background: var(--plum);
      border-color: var(--plum-rich);
      color: rgba(255,245,255,0.95);
      cursor: pointer;
      box-shadow: 0 4px 24px var(--plum-shadow), 0 1px 0 rgba(200,160,255,0.25) inset;
    }
    #add-btn.ready:hover {
      background: var(--plum-rich);
      box-shadow: 0 6px 32px rgba(149,82,200,0.5), 0 1px 0 rgba(200,160,255,0.3) inset;
    }
    #add-btn.ready:active { transform: scale(0.98); }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="bg-overlay"></div>

<div id="app">
  <header>
    <div class="wordmark">
      <span class="wordmark-sup">The</span>
      <em>Niggle</em> List
    </div>
    <div id="tally"></div>
  </header>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab on" data-tab="active">
      Active <span class="tab-count" id="active-count">0</span>
    </button>
    <button class="tab" data-tab="done">
      Done <span class="tab-count" id="done-count">0</span>
    </button>
  </div>

  <!-- Filter (active tab only) -->
  <div id="filter-wrap">
    <div class="filter-eyebrow">I've got</div>
    <div id="filter-row">
      <button class="f-btn all-btn on" data-f="all">All</button>
      <button class="f-btn" data-f="5">
        <span class="f-num">5</span><span class="f-unit">min</span>
      </button>
      <button class="f-btn" data-f="15">
        <span class="f-num">15</span><span class="f-unit">min</span>
      </button>
      <button class="f-btn" data-f="30">
        <span class="f-num">30</span><span class="f-unit">min</span>
      </button>
      <button class="f-btn" data-f="60">
        <span class="f-num">60+</span><span class="f-unit">min</span>
      </button>
    </div>
    <div id="room-filter-wrap"></div>
  </div>

  <div class="divider"></div>
  <div id="list-area"></div>
</div>

<button id="fab" aria-label="Add a niggle">+</button>
<div id="overlay"></div>

<div id="sheet" role="dialog" aria-modal="true" aria-label="Capture a niggle">
  <div class="sheet-inner">
    <div class="handle-wrap"><div class="handle"></div></div>
    <div class="sheet-title">What's the niggle?</div>
    <textarea id="niggle-input" placeholder="Squeaky hinge, loose tile, flickering bulb…" maxlength="300"></textarea>
    <div class="s-label">Time needed</div>
    <div class="time-grid">
      <button class="t-btn" data-t="5"><span class="t-num">5</span><span class="t-unit">min</span></button>
      <button class="t-btn" data-t="15"><span class="t-num">15</span><span class="t-unit">min</span></button>
      <button class="t-btn" data-t="30"><span class="t-num">30</span><span class="t-unit">min</span></button>
      <button class="t-btn" data-t="60"><span class="t-num">60+</span><span class="t-unit">min</span></button>
    </div>
    <div class="s-label">Room / area <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--ink-4);font-size:10px">(optional)</span></div>
    <input type="text" id="room-cap-input" placeholder="Kitchen, garage, hallway…" maxlength="60">
    <button id="add-btn">Add to list</button>
  </div>
</div>

<script>
const STORE = 'niggle_v1';
let niggles = (() => { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } })();
let activeTab  = 'active';
let timeFilter = 'all';
let roomFilter = 'all';
let selTime    = null;

const $ = id => document.getElementById(id);
const listEl       = $('list-area');
const tallyEl      = $('tally');
const overlay      = $('overlay');
const sheet        = $('sheet');
const inp          = $('niggle-input');
const roomCapInp   = $('room-cap-input');
const addBtn       = $('add-btn');
const filterWrap   = $('filter-wrap');
const roomFilterWrap = $('room-filter-wrap');
const tBtns        = document.querySelectorAll('.t-btn');
const fBtns        = document.querySelectorAll('.f-btn');
const tabs         = document.querySelectorAll('.tab');

function save() { localStorage.setItem(STORE, JSON.stringify(niggles)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function monthKey(ts) {
  const d = new Date(ts || Date.now());
  return `${d.getFullYear()}-${d.getMonth()}`;
}
function ageClass(ts) {
  const d = (Date.now() - ts) / 86400000;
  return d >= 28 ? 'age-old' : d >= 7 ? 'age-mid' : '';
}
function timeFmt(m) {
  if (!m) return null;
  return m >= 60 ? '60+ min' : `${m} min`;
}
function clearedFmt(ts) {
  const now = Date.now();
  const diff = now - ts;
  const d = new Date(ts);
  if (diff < 86400000) return 'Today';
  if (diff < 172800000) return 'Yesterday';
  if (diff < 604800000) {
    return d.toLocaleDateString('en-GB', { weekday: 'long' });
  }
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── Tally ────────────────────────────────────
function updateTally() {
  const mk   = monthKey();
  const done = niggles.filter(n => n.completedAt && monthKey(n.completedAt) === mk);
  const pending = niggles.filter(n => !n.completedAt).length;
  $('active-count').textContent = pending;
  $('done-count').textContent   = done.length;
  if (!done.length) { tallyEl.textContent = ''; tallyEl.classList.remove('lit'); return; }
  const mins = done.reduce((s, n) => s + (n.estimateMinutes || 0), 0);
  tallyEl.textContent = `${done.length} cleared this month — about ${mins} minutes reclaimed.`;
  tallyEl.classList.add('lit');
}

// ── Room filter builder ───────────────────────
function buildRoomFilter() {
  const rooms = [...new Set(
    niggles.filter(n => !n.completedAt && n.room).map(n => n.room)
  )].sort();

  roomFilterWrap.innerHTML = '';
  if (rooms.length === 0) { roomFilterWrap.classList.remove('visible'); return; }
  roomFilterWrap.classList.add('visible');

  const all = document.createElement('button');
  all.className = 'rf-btn' + (roomFilter === 'all' ? ' on' : '');
  all.textContent = 'All rooms';
  all.addEventListener('click', () => { roomFilter = 'all'; buildRoomFilter(); render(); });
  roomFilterWrap.appendChild(all);

  rooms.forEach(r => {
    const b = document.createElement('button');
    b.className = 'rf-btn' + (roomFilter === r ? ' on' : '');
    b.textContent = r;
    b.addEventListener('click', () => { roomFilter = r; buildRoomFilter(); render(); });
    roomFilterWrap.appendChild(b);
  });
}

// ── Render ────────────────────────────────────
function render() {
  updateTally();
  buildRoomFilter();
  listEl.innerHTML = '';

  if (activeTab === 'active') {
    filterWrap.style.display = '';
    renderActive();
  } else {
    filterWrap.style.display = 'none';
    renderDone();
  }
}

function renderActive() {
  const pending = niggles.filter(n => !n.completedAt);
  let shown = timeFilter === 'all'
    ? pending
    : pending.filter(n => n.estimateMinutes === parseInt(timeFilter));
  if (roomFilter !== 'all') shown = shown.filter(n => n.room === roomFilter);
  shown = shown.slice().sort((a, b) => a.createdAt - b.createdAt);

  if (pending.length === 0) {
    listEl.innerHTML = `<div class="empty">
      <div class="empty-head">Nothing here yet.</div>
      <div class="empty-sub">Every niggle you add is one less thing<br>living rent-free in your head.</div>
    </div>`;
    return;
  }
  if (shown.length === 0) {
    listEl.innerHTML = `<div class="no-match">Nothing fits that window right now.</div>`;
    return;
  }

  shown.forEach(n => listEl.appendChild(makeActiveCard(n)));
}

function makeActiveCard(n) {
  const card = document.createElement('div');
  card.className = 'card ' + ageClass(n.createdAt);
  card.dataset.id = n.id;

  // Delete reveal
  const del = document.createElement('div');
  del.className = 'delete-reveal';
  del.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </svg> Remove`;
  del.addEventListener('click', () => removeNiggle(n.id, card));

  // Inner content
  const inner = document.createElement('div');
  inner.className = 'card-inner';

  const chk = document.createElement('button');
  chk.className = 'chk';
  chk.setAttribute('aria-label', 'Mark complete');
  chk.innerHTML = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none">
    <path d="M1.5 4.5L4.5 7.5L10.5 1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  const body = document.createElement('div');
  body.className = 'card-body';
  const txt = document.createElement('div');
  txt.className = 'card-text';
  txt.textContent = n.text;

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  if (n.estimateMinutes) {
    const c = document.createElement('span');
    c.className = 'chip time';
    c.textContent = timeFmt(n.estimateMinutes);
    meta.appendChild(c);
  }
  if (n.room) {
    const c = document.createElement('span');
    c.className = 'chip';
    c.textContent = n.room;
    meta.appendChild(c);
  }

  body.appendChild(txt);
  if (meta.children.length) body.appendChild(meta);
  inner.appendChild(chk);
  inner.appendChild(body);
  card.appendChild(del);
  card.appendChild(inner);

  chk.addEventListener('click', () => completeNiggle(n.id, card, txt));
  attachSwipe(card, del, inner);
  return card;
}

function renderDone() {
  const done = niggles
    .filter(n => n.completedAt)
    .slice()
    .sort((a, b) => b.completedAt - a.completedAt);

  if (done.length === 0) {
    listEl.innerHTML = `<div class="empty">
      <div class="empty-head">Nothing cleared yet.</div>
      <div class="empty-sub">Completed niggles will appear here.</div>
    </div>`;
    return;
  }

  const clearBtn = document.createElement('button');
  clearBtn.id = 'clear-done-btn';
  clearBtn.textContent = 'Clear all completed';
  clearBtn.addEventListener('click', () => {
    niggles = niggles.filter(n => !n.completedAt);
    save();
    render();
  });
  listEl.appendChild(clearBtn);

  done.forEach(n => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = 'rgba(255,245,255,0.04)';

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    const body = document.createElement('div');
    body.className = 'card-body';
    const txt = document.createElement('div');
    txt.className = 'card-text struck';
    txt.textContent = n.text;
    const meta = document.createElement('div');
    meta.className = 'card-meta';

    if (n.estimateMinutes) {
      const c = document.createElement('span');
      c.className = 'chip time';
      c.textContent = timeFmt(n.estimateMinutes);
      meta.appendChild(c);
    }
    if (n.room) {
      const c = document.createElement('span');
      c.className = 'chip';
      c.textContent = n.room;
      meta.appendChild(c);
    }
    const when = document.createElement('span');
    when.className = 'chip cleared';
    when.textContent = clearedFmt(n.completedAt);
    meta.appendChild(when);

    body.appendChild(txt);
    body.appendChild(meta);

    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'restore-btn';
    restoreBtn.textContent = 'Restore';
    restoreBtn.addEventListener('click', () => restoreNiggle(n.id, card));

    inner.appendChild(body);
    inner.appendChild(restoreBtn);
    card.appendChild(inner);
    listEl.appendChild(card);
  });
}

// ── Actions ───────────────────────────────────
function completeNiggle(id, card, txtEl) {
  const chk = card.querySelector('.chk');
  if (chk.classList.contains('done')) return;
  chk.classList.add('done');
  txtEl.classList.add('struck');
  setTimeout(() => {
    card.classList.add('collapsing');
    setTimeout(() => {
      const i = niggles.findIndex(n => n.id === id);
      if (i !== -1) { niggles[i].completedAt = Date.now(); save(); }
      card.remove();
      updateTally();
    }, 400);
  }, 520);
}

function restoreNiggle(id, card) {
  card.classList.add('collapsing');
  setTimeout(() => {
    const i = niggles.findIndex(n => n.id === id);
    if (i !== -1) { niggles[i].completedAt = null; save(); }
    card.remove();
    render();
  }, 380);
}

function removeNiggle(id, card) {
  card.classList.add('collapsing');
  setTimeout(() => {
    niggles = niggles.filter(n => n.id !== id);
    save();
    card.remove();
    render();
  }, 380);
}

// ── Swipe to delete ───────────────────────────
function attachSwipe(card, delReveal, inner) {
  let startX = 0, dx = 0, dragging = false;
  const threshold = 72;

  function onStart(x) { startX = x; dx = 0; dragging = true; card.classList.add('swiping'); }
  function onMove(x) {
    if (!dragging) return;
    dx = Math.min(0, x - startX);
    inner.style.transform = `translateX(${dx}px)`;
    card.classList.toggle('swipe-open', dx < -threshold * 0.5);
  }
  function onEnd() {
    if (!dragging) return;
    dragging = false;
    card.classList.remove('swiping');
    if (dx < -threshold) {
      inner.style.transform = `translateX(-90px)`;
      card.classList.add('swipe-open');
    } else {
      inner.style.transform = '';
      card.classList.remove('swipe-open');
    }
  }

  card.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
  card.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });
  card.addEventListener('touchend', onEnd);

  // reset on outside tap
  document.addEventListener('touchstart', e => {
    if (!card.contains(e.target) && card.classList.contains('swipe-open')) {
      inner.style.transform = '';
      card.classList.remove('swipe-open');
    }
  }, { passive: true });
}

// ── Tabs ──────────────────────────────────────
tabs.forEach(t => {
  t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    activeTab = t.dataset.tab;
    render();
  });
});

// ── Time filter ───────────────────────────────
fBtns.forEach(b => {
  b.addEventListener('click', () => {
    fBtns.forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    timeFilter = b.dataset.f;
    render();
  });
});

// ── Sheet ─────────────────────────────────────
function openSheet() {
  overlay.classList.add('open');
  sheet.classList.add('open');
  setTimeout(() => inp.focus(), 340);
}
function closeSheet() {
  sheet.classList.remove('open');
  overlay.classList.remove('open');
  setTimeout(() => {
    inp.value = '';
    roomCapInp.value = '';
    selTime = null;
    tBtns.forEach(b => b.classList.remove('sel'));
    setReady();
  }, 340);
}
function setReady() {
  addBtn.classList.toggle('ready', inp.value.trim().length > 0);
}

$('fab').addEventListener('click', openSheet);
overlay.addEventListener('click', closeSheet);
inp.addEventListener('input', setReady);

tBtns.forEach(b => {
  b.addEventListener('click', () => {
    tBtns.forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    selTime = parseInt(b.dataset.t);
  });
});

addBtn.addEventListener('click', () => {
  const text = inp.value.trim();
  if (!text) return;
  niggles.push({
    id: uid(), text,
    estimateMinutes: selTime,
    room: roomCapInp.value.trim() || null,
    createdAt: Date.now(),
    completedAt: null,
  });
  save();
  closeSheet();
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && sheet.classList.contains('open')) {
    if (inp.value.trim()) addBtn.click();
  }
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (!sheet.classList.contains('open')) return;
    const gap = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    sheet.style.bottom = gap > 0 ? gap + 'px' : '';
  });
}

render();
</script>
</body>
</html>
